<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fbfbfb"/>
      <stop offset="1" stop-color="#ebeceb"/>
    </linearGradient>
    <linearGradient id="amber" x1="118" y1="86" x2="356" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F0887A"/>
      <stop offset="0.5" stop-color="#E8705F"/>
      <stop offset="1" stop-color="#C05040"/>
    </linearGradient>
    <linearGradient id="paper" x1="256" y1="74" x2="256" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f2f4"/>
    </linearGradient>
    <linearGradient id="paperSoft" x1="256" y1="82" x2="256" y2="410" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fdfdfd"/>
      <stop offset="1" stop-color="#eef0f2"/>
    </linearGradient>
    <linearGradient id="frontSheen" x1="170" y1="70" x2="318" y2="372" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.72"/>
      <stop offset="0.26" stop-color="#fffaf8" stop-opacity="0.48"/>
      <stop offset="0.56" stop-color="#ffd9cf" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="frontGlass" x1="256" y1="40" x2="256" y2="374" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.24"/>
      <stop offset="0.18" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <radialGradient id="frontInnerGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(256 238) rotate(90) scale(220 172)">
      <stop offset="0.58" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.82" stop-color="#F4A093" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#E8705F" stop-opacity="0.24"/>
    </radialGradient>
    <clipPath id="frontPageClip">
      <rect x="-138" y="-180" width="276" height="360" rx="33"/>
    </clipPath>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dy="10"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.18"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="frontGlow" x="-45%" y="-45%" width="190%" height="210%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect x="1" y="1" width="510" height="510" rx="115" stroke="#d6d8db" stroke-opacity="0.85"/>

  <g transform="translate(256 258)" filter="url(#shadow)">
    <rect x="-138" y="-180" width="276" height="360" rx="33" fill="url(#paperSoft)" fill-opacity="0.74" stroke="#d7dade" stroke-opacity="0.74" stroke-width="3" transform="translate(-54 -10) rotate(-8)"/>
    <rect x="-138" y="-180" width="276" height="360" rx="33" fill="url(#paper)" fill-opacity="0.82" stroke="#d6dade" stroke-opacity="0.84" stroke-width="3" transform="translate(54 -10) rotate(8)"/>
    <g transform="translate(0 18) scale(1.14)">
      <rect x="-138" y="-180" width="276" height="360" rx="33" fill="#E8705F" fill-opacity="0.26" filter="url(#frontGlow)"/>
      <rect x="-138" y="-180" width="276" height="360" rx="33" fill="url(#paper)" fill-opacity="0.94" stroke="url(#amber)" stroke-opacity="0.72" stroke-width="7"/>
      <rect x="-128" y="-170" width="256" height="340" rx="28" fill="url(#frontInnerGlow)"/>
      <rect x="-138" y="-180" width="276" height="360" rx="33" fill="url(#frontGlass)"/>
      <g clip-path="url(#frontPageClip)">
        <rect x="-138" y="-180" width="276" height="360" rx="33" fill="url(#frontSheen)" transform="skewX(-8) translate(-20 0)"/>
      </g>
      <g>
        <circle cx="0" cy="-28" r="76" fill="url(#amber)" fill-opacity="0.98"/>
        <path d="M-38 -28 L-11 2 L40 -51" stroke="#ffffff" stroke-width="21" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="-58" y="82" width="116" height="18" rx="9" fill="url(#amber)" fill-opacity="0.96"/>
      </g>
    </g>
  </g>
</svg>